model:
  name: credit_default_xgb
  version: "1.0.0"
  path: models/credit_default.joblib
  type: classifier

data:
  schema_path: schema/credit_features.json
  reference_path: data/reference_window.csv
  target_column: default_payment_next_month
  batch_size: 500

detection:
  label_free:
    enabled: true
    psi_threshold: 0.2
    kl_threshold: 0.1
  label_available:
    enabled: true
    adwin_delta: 0.002
  shap:
    enabled: true
    background_samples: 100
    delta_threshold: 0.05

severity:
  low_psi_max: 0.2
  med_psi_max: 0.4

agents:
  llm_provider: groq
  model: llama-3.3-70b-versatile
  top_k_features: 3

output:
  wandb_project: driftlens
  wandb_entity: savirpatil-purdue-university
  reports_dir: outputs/reports
  alerts_dir: outputs/alerts

api:
  host: 0.0.0.0
  port: 8000